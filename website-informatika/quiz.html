<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Soal</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Latihan Soal</h1>
    </header>
    <nav class="breadcrumb"><a href="index.html">Beranda</a> <span>></span> <span>Latihan Soal</span></nav>
    <main>
      <section class="quiz-container">
        <!-- nomor soal -->
        <div class="question-number" id="questionNumber">Soal 1</div>

        <!-- soal -->
        <div id="question"></div>

        <!-- pilihan jawaban -->
        <div id="answers" class="answers"></div>

        <!-- tombol next -->
        <button onclick="nextQuestion()" class="start-btn">Soal Selanjutnya</button>

        <!-- hasil -->
        <div id="result" style="display: none">
          <h2 id="scoreText"></h2>

          <br />

          <a href="index.html">
            <button class="start-btn">Kembali ke Menu Utama</button>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2025 Latihan Soal</p>
    </footer>
